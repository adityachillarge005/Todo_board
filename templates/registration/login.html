{% extends 'app1/base.html' %}

{% block content %}
<section class="panel auth-panel">
    <h2>Login</h2>

    <form method="POST" class="auth-form">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" class="button button-primary">Login</button>
    </form>

    <p class="auth-switch">
        Don't have an account?
        <a href="{% url 'signup' %}">Sign up</a>
    </p>
</section>
{% endblock %}
